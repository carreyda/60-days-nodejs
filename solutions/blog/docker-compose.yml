# ===========================================================================
# blog 全栈编排 —— Day 42：一个 `docker compose up -d` 把 api + PostgreSQL + Redis
# 连同「迁移 job」一起拉起来，并保证【启动顺序】：DB 健康 → 跑迁移 → api 就绪后才接流量。
# ---------------------------------------------------------------------------
# 和 blog-db/docker-compose.yml（只起 PG + Redis 两个基础设施，给本地 dev 用）的区别：
# 这份把【应用本身】也编进来，服务间用 compose 网络 + 服务名互访（postgres / redis），
# 不再走宿主机的 localhost 端口——所以底下三个服务的依赖地址从 localhost 换成了服务名。
#
# ★ 验证顺序（无法在本机完整 docker build——环境连不上镜像仓库；改用三层验证，见
#   days/day-42/README.md「怎么验证」一节）：本文件用 `docker compose config` 校验过
#   语法 + 变量插值；业务逻辑层（Dockerfile）在 Day 41 已验证；这里只新增编排关系。
# ============================================================================

# 顶层统一声明 compose 规范版本（v2）。现代 Docker Desktop / compose v2 默认即可。
name: blog-stack

services:
  # ── PostgreSQL：真相源 ──────────────────────────────────────────────────
  # 故意【不映射 host 端口】：DB 只给同网络的 api / migrate 访问，不对宿主机暴露。
  # 生产里 DB 更不该裸露在主机端口上——少一个攻击面。要 psql 进去看数据：
  #   docker compose exec postgres psql -U blog -d blog
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: blog
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-blog_dev_pwd}
      POSTGRES_DB: blog
      TZ: Asia/Shanghai
      PGTZ: Asia/Shanghai
    volumes:
      - pg-data:/var/lib/postgresql/data
    # 健康检查是整个【启动顺序】的地基：api 和 migrate 都 depends_on 它 service_healthy。
    # pg_isready 是 postgres 自带的探活命令，查「数据库进程起来了、能接受连接」。
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog -d blog"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  # ── Redis：缓存 / 队列 ──────────────────────────────────────────────────
  # 同样不映射 host 端口，仅内网可达。
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # 关掉持久化：缓存丢了从 DB 回填即可（和 blog-db 的 dev 哲学一致）。
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 3s

  # ── migrate：一次性迁移 job ──────────────────────────────────────────────
  # 启动顺序里的「夹层」：等 DB 健康 → 跑 prisma migrate deploy → 退出。
  # api depends_on 它 service_completed_successfully——迁移没成功跑完，api 不起。
  #
  # 为什么单独起一个 job、不在 api 启动时顺带 migrate：
  #   1. 横向扩容时 api 有 N 个副本，谁都不该负责「改库结构」——否则 N 个副本抢着
  #      migrate 会互相踩。迁移是【一次性、需要串行】的动作，由独立 job 独占最稳。
  #   2. migrate 失败时，job 退出非 0，api 因依赖条件不满足而【不启动】——
  #      库结构没就绪就别让 api 接流量，fail closed。
  migrate:
    build:
      context: ./blog-api
      # 复用 blog-api/Dockerfile 的【deps 段】：那里装了【全量】依赖（含 prisma CLI）+
      # COPY 了 prisma/（schema + migrations + migration_lock.toml）。
      # runner 段用 --prod 装依赖、没有 prisma CLI，跑不了 migrate。拿 deps 段当这个
      # 一次性 job 的镜像，最省也最对（migrate 只需要 CLI + 迁移文件，不需要编译产物）。
      target: deps
    # migrate deploy 对已应用的迁移是幂等的——重复 `compose up` 只补未应用的，不重复建表。
    command: ["pnpm", "exec", "prisma", "migrate", "deploy"]
    environment:
      DATABASE_URL: postgresql://blog:${POSTGRES_PASSWORD:-blog_dev_pwd}@postgres:5432/blog?schema=blog_api
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no" # 一次性 job：跑完即退，不重启

  # ── api：应用本体 ────────────────────────────────────────────────────────
  api:
    build:
      context: ./blog-api
      # 不指定 target → 用 Dockerfile 最后一段（runner）：生产级最小镜像（无编译器/源码/devDeps）。
    restart: unless-stopped
    ports:
      # 只有 api 对宿主机暴露端口——外部要访问 API。DB / Redis 都不暴露（见上）。
      - "${API_PORT:-3000}:3000"
    environment:
      NODE_ENV: production # 镜像里也硬编码了 production；显式再写一遍，单一可见
      PORT: 3000
      # ★ 依赖地址用【服务名】，不是 localhost：容器里的 localhost 是容器自己，
      #   连不到别的服务。compose 给同一份编排里的服务自动建网络、自动做服务名 DNS。
      DATABASE_URL: postgresql://blog:${POSTGRES_PASSWORD:-blog_dev_pwd}@postgres:5432/blog?schema=blog_api
      REDIS_URL: redis://redis:6379
      # JWT 密钥必须由部署者提供。镜像硬编码 NODE_ENV=production，而 config.validation.ts
      # 在 production 下会拒绝 .env.example 的示例 secret——没设或设占位值就启动即崩。
      # ${VAR:?msg} 让 compose 在变量缺失时直接报错退出（fail-fast），而不是偷偷用空值。
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?在 solutions/blog/.env 里设置 JWT_ACCESS_SECRET（≥32 字符，见 .env.example）}
      # 本地存储后端：封面图落容器内 /app/uploads。S3 后端见 .env.example，需另配 S3_*。
      STORAGE_BACKEND: local
      STORAGE_LOCAL_DIR: uploads
      STORAGE_PUBLIC_PREFIX: /uploads
    volumes:
      # 封面图写到命名卷，容器重建不丢图。目录在镜像里已 chown 给非 root 的 app（Day 41）。
      - uploads:/app/uploads
    depends_on:
      # 启动顺序的三道闸，逐级放宽「能不能起」：
      #   1. DB 健康（连接就绪）
      #   2. Redis 健康（缓存层就绪）
      #   3. migrate 成功完成（库结构就绪）—— 三者都满足 api 才起。
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      # ★ 覆盖镜像内置的探针：镜像里的 HEALTHCHECK 打 /health（存活，进程级），
      #   对编排器「能不能导流量」这个问题答非所问——进程活着不代表 DB 连得上。
      #   这里改成打 /health/ready（就绪，查 DB + Redis）：任一不可用返回 503，
      #   探针判 unhealthy，compose / 编排器就不会把流量往这导。
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3000/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 25s # Nest 冷启动 + Prisma 连库 + terminus 首检，留够缓冲再开始判

# ── 持久化卷 ───────────────────────────────────────────────────────────────
# pg-data：DB 数据。重建容器不丢库；`docker compose down -v` 才删。
# uploads：本地存储的封面图。
# redis-data：redis 关了持久化，这个卷基本空着，留作将来开 appendonly 时用。
volumes:
  pg-data:
  uploads:
  redis-data:
